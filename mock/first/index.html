<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <title>デジタル・アーカイブ — 今日は歴史の中の何日か</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #000000;
      --card: #1a1a1a;
      --card-2: #141414;
      --gold: #c5a059;
      --gold-dim: rgba(197, 160, 89, 0.35);
      --text: #f0f0f0;
      --text-muted: #8c8c8c;
      --text-dim: #5a5a5a;
      --serif-ja: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --serif-en: "Cormorant Garamond", "Noto Serif JP", Georgia, serif;
      --sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      --radius: 4px;
      --radius-sm: 2px;
      --maxw: 430px;
      --tabh: 58px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.75;
      letter-spacing: 0.03em;
      min-height: 100dvh;
      padding-bottom: calc(var(--tabh) + env(safe-area-inset-bottom) + 20px);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    .shell { max-width: var(--maxw); margin: 0 auto; min-height: 100dvh; }
    .status-mock {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 18px 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .status-mock .time { font-variant-numeric: tabular-nums; }
    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 16px;
      gap: 8px;
    }
    .app-bar__left,
    .app-bar__right {
      width: 44px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--gold);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      border-radius: var(--radius);
      opacity: 0.9;
    }
    .app-bar__left:hover,
    .app-bar__right:hover { opacity: 1; }
    .app-bar__center { flex: 1; text-align: center; min-width: 0; }
    .app-bar__title {
      font-family: var(--serif-en);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gold);
      margin: 0;
      letter-spacing: 0.08em;
    }
    .hero { padding: 0 20px 24px; }
    .hero__kicker-en {
      font-family: var(--serif-en);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 6px;
    }
    .hero__title {
      font-family: var(--serif-ja);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.25;
      margin: 0 0 12px;
      letter-spacing: 0.04em;
    }
    .hero__title span { font-size: 0.92em; }
    .hero__lead {
      font-size: 0.8rem;
      line-height: 1.85;
      color: var(--text-muted);
      margin: 0 0 20px;
    }
    .hero__figure {
      position: relative;
      margin: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
    }
    .hero__figure::after {
      content: "";
      position: absolute;
      bottom: 14px;
      left: 14px;
      width: 40px;
      height: 40px;
      border-left: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
      pointer-events: none;
      z-index: 2;
    }
    .hero-slider { position: relative; }
    .hero-slider__viewport {
      overflow: hidden;
      width: 100%;
      touch-action: pan-y;
    }
    .hero-slider__track {
      display: flex;
      margin: 0;
      padding: 0;
      list-style: none;
      transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.2, 1);
      will-change: transform;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-slider__track { transition: none; }
    }
    .hero-slider__slide {
      flex: 0 0 calc(100% / var(--hero-slides, 4));
      min-width: 0;
    }
    /* 幅に対する高さ: 1.5 を基準に 70% = 1.5 × 0.7 = 1.05 */
    .hero-slider__slide img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.05;
      object-fit: cover;
    }
    .hero-slider__ui {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 3;
      pointer-events: none;
    }
    .hero-slider__arrow {
      pointer-events: auto;
      width: 40px;
      height: 48px;
      border: none;
      margin: 0 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--gold);
      background: rgba(0, 0, 0, 0.35);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .hero-slider__arrow:hover { background: rgba(0, 0, 0, 0.5); }
    .hero-slider__arrow:active { opacity: 0.8; }
    .hero-slider__dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10px;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      pointer-events: none;
    }
    .hero-slider__dot {
      pointer-events: auto;
      width: 6px;
      height: 6px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--text-dim);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .hero-slider__dot--on,
    .hero-slider__dot[aria-current="true"] {
      background: var(--gold);
      transform: scale(1.15);
    }
    main { padding: 0 20px; }
    .section-label {
      font-family: var(--serif-en);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin: 32px 0 14px;
      padding-top: 8px;
      border-top: 1px solid rgba(197, 160, 89, 0.2);
    }
    .section-label:first-of-type { margin-top: 8px; border-top: 0; padding-top: 0; }
    .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
    .section-title-ja { font-family: var(--serif-ja); font-size: 1rem; color: var(--text); margin: 0; }
    .section-sort { font-size: 0.65rem; color: var(--text-dim); }
    .card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .img-g { filter: grayscale(1) contrast(1.08) brightness(0.9); }
    .label-tag {
      font-family: var(--serif-en);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 8px;
    }
    .card--std { padding: 16px 16px; }
    .card--std__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .card--std__year { font-family: var(--serif-en); font-size: 0.9rem; color: var(--gold); font-weight: 600; }
    .card--std__h {
      font-family: var(--serif-ja);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px;
      line-height: 1.45;
    }
    .card--std__p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
    .card--fact { padding: 16px; border: 1px solid rgba(197, 160, 89, 0.25); background: var(--card-2); }
    .card--fact .label-tag { margin-bottom: 6px; }
    .card--fact p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
    .foot-note {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-dim);
      padding: 32px 24px 8px;
      line-height: 1.6;
    }
    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      max-width: var(--maxw);
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      min-height: var(--tabh);
      padding: 6px 12px env(safe-area-inset-bottom);
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(197, 160, 89, 0.15);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.6rem;
      font-weight: 500;
      cursor: default;
      padding: 4px 0;
    }
    .tab__ico { font-size: 1.35rem; line-height: 1; filter: grayscale(1) opacity(0.65); }
    .tab--active { color: var(--gold); }
    .tab--active .tab__ico { filter: none; opacity: 1; }
    .hero__fv-eyecatch {
      font-family: var(--serif-ja);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }
    .hero__fv-eyecatch .hero__fv-year {
      color: var(--gold);
      font-size: 0.85em;
      font-weight: 600;
    }
    .hero-fv {
      margin-top: 20px;
      padding: 0 0 4px;
      border-top: 1px solid rgba(197, 160, 89, 0.2);
      padding-top: 16px;
    }
    .hero-fv__label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 6px;
    }
    .hero-fv__summary {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
      margin: 0 0 14px;
    }
    .hero-fv__body {
      font-size: 0.8rem;
      line-height: 1.9;
      color: var(--text-muted);
      margin: 0;
    }
    .hero-fv__body p {
      margin: 0 0 0.85em;
    }
    .hero-fv__body p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="status-mock" aria-hidden="true">
      <span class="time" id="clock">9:41</span>
      <span style="letter-spacing:0.15em;">●</span>
    </div>
    <header class="app-bar">
      <button type="button" class="app-bar__left" aria-label="メニュー">☰</button>
      <div class="app-bar__center">
        <h1 class="app-bar__title">デジタル・アーカイブ</h1>
      </div>
      <button type="button" class="app-bar__right" aria-label="検索">🔍</button>
    </header>

    <section class="hero" aria-label="本日の特集（FV）">
      <p class="hero__kicker-en">Today in history</p>
      <p class="hero__title" id="hero-line">今日：<span id="hero-jp">4月16日</span></p>
      <p class="hero__fv-eyecatch" id="hero-fv-eyecatch" aria-label="本日特集の見出し"></p>
      <p class="hero__lead" id="hero-sub"></p>
      <figure class="hero__figure">
        <div
          class="hero-slider"
          id="hero-slider"
          role="region"
          aria-roledescription="カルーセル"
          aria-label="本日のビジュアル"
          style="--hero-slides: 4"
        >
          <div class="hero-slider__viewport" id="hero-viewport" tabindex="0">
            <ul class="hero-slider__track" id="hero-track"></ul>
          </div>
          <div class="hero-slider__ui" aria-hidden="true">
            <button type="button" class="hero-slider__arrow" id="hero-prev" aria-label="前の画像">‹</button>
            <button type="button" class="hero-slider__arrow" id="hero-next" aria-label="次の画像">›</button>
          </div>
          <div class="hero-slider__dots" id="hero-dots" role="group" aria-label="スライドの位置"></div>
        </div>
      </figure>
      <div class="hero-fv" id="hero-fv-block" aria-label="本日特集の解説">
        <p class="hero-fv__label">概要</p>
        <p class="hero-fv__summary" id="hero-fv-summary"></p>
        <p class="hero-fv__label">説明</p>
        <div class="hero-fv__body" id="hero-fv-body"></div>
      </div>
    </section>

    <main id="root"></main>
    <p class="foot-note">デジタル・アーカイブ風のモックです。年号の表示は年のみの目安です。画像は代表イメージです。</p>
  </div>

  <nav class="tabbar" aria-label="メイン">
    <div class="tab tab--active">
      <span class="tab__ico" aria-hidden="true">◉</span>
      <span>今日</span>
    </div>
    <div class="tab">
      <span class="tab__ico" aria-hidden="true">▢</span>
      <span>年表</span>
    </div>
    <div class="tab">
      <span class="tab__ico" aria-hidden="true">▭</span>
      <span>蔵書</span>
    </div>
  </nav>

  <script>
    const HERO_IMAGES = [
      "assets/slider_1.jfif",
      "assets/slider_2.jfif",
      "assets/slider_3.jfif",
      "assets/slider_4.jfif"
    ];

    /** ファーストビュー（ヒーロー）特集 — アポロ16号 */
    const FV_EVENT = {
      year: 1972,
      month: 4,
      day: 16,
      titleLine: "アポロ16号 打ち上げ",
      lead:
        "NASAの有人月ミッション・アポロ計画の第10回飛行（最後から2番目の月着陸ミッション）が、フロリダ州ケネディ宇宙センターからスタートした日。月の「高地」への初着陸を狙い、クレーターに偏りがちだった着陸点の地質を一気に補完する意義を持った。",
      summary:
        "1972年4月16日（米東部時間）、**サターン5**ロケット（AS-511）で打ち上げ。船名は指令船「カスパー」、月着陸船「オリオン」。クルーはジョン・ヤング（船長）、チャールズ・デューク（着陸船操縦士）、トマス・マットイングリー（指令船操縦士）。着陸目標はデイケン高地（Descartes）付近で、若い火山岩と古老な高地の岩石を対比できる観測点を選定。月面では3回の船外活動を行い、合計約20時間弱、月面車LRVで約27kmを走破、岩石・土壌の採取や月震計の設置などを実施し、地球に約95kgのサンプルを持ち帰った。",
      descriptionParagraphs: [
        "このミッションの大きなテーマは「月の高地」そのものの科学で、月海（マリア）主体の着陸が続いたアポロの潮流に、地質年齢差とクレーター累積史を同時に読み解くためのピースを挿入した。採取サンプルは、後の**惑星地質**・**宇宙化学**研究で、月の地殻分異や巨大衝突史を議論する中核的データの一翼となり、今日まで学術的に蓄積・再解析が続いている。",
        "帰還の軌跡上では、指令船パノラマ窓越しの**地球・太陽・宇宙**の同時把握や、人間の身体が耐える**放射線・低重力**下での長時間活動の記録は、以後の有人宇宙施設（スペースシャトル、ISS、そして再び月を目指す各計画）の**生命維持・作業工学的知見**の母体にもなった。",
        "映像とテレメトリは、**巨大ロケットと精密探査器の合体**に人が乗る、という20世紀宇宙開発の到達点を象徴する記録であると同時に、地球外天体での**現地科学（フィールド地質）**の価値を、一般にも分かる形で残した。スライド上の静止画をめくるように思い出を呼び起こす体験は、デジタル・アーカイブが求める「閲覧」と「文脈の回復」に重なる。"
      ]
    };

    const categories = [
      {
        id: "world",
        emoji: "🌍",
        title: "国際・近代史",
        sort: "掲載順",
        events: [
          { year: 1889, title: "アドルフ・ヒトラー誕生", score: 6, summary: "オーストリアのブラウナウで誕生", text: "後に第二次世界大戦を引き起こすナチス・ドイツの指導者となり、20世紀最大の悲劇の一因となった。", image: "https://images.unsplash.com/photo-1526406673874-1f6f7e0c8a5d?w=800&q=80" },
          { year: 1912, title: "シアトル・ゼネスト（前後期の労働運動の象徴）", score: 7, summary: "アメリカで労働運動が活発化", text: "20世紀初頭の労働者権利の拡大に向けた動きの一端を象徴する出来事として位置づけられる。", image: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&q=80" },
          { year: 1999, title: "コロンバイン高校銃乱射事件", score: 7, summary: "アメリカ・コロラド州で発生", text: "学校銃撃事件の象徴的存在となり、銃規制や学校安全対策の議論を世界的に加速させた。", image: "https://images.unsplash.com/photo-1580582932707-520aed937d7b?w=800&q=80" }
        ]
      },
      {
        id: "science",
        emoji: "🚀",
        title: "科学・技術",
        sort: "掲載順",
        events: [
          { year: 2010, title: "ディープウォーター・ホライズン原油流出事故", score: 6, summary: "メキシコ湾で海底油田が爆発", text: "史上最大級の海洋汚染事故の一つで、環境問題とエネルギー政策への関心を高めた。", image: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21?w=800&q=80" },
          { year: 1984, title: "任天堂がファミコン普及を加速", score: 6, summary: "家庭用ゲーム機が世界的に普及", text: "後のゲーム産業の基盤を築き、デジタル娯楽のあり方を変えた。", image: "https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=800&q=80" }
        ]
      },
      {
        id: "culture_social",
        emoji: "🎭",
        title: "文化・社会",
        sort: "掲載順",
        events: [
          { year: 1968, title: "プラハの春の影響拡大", score: 7, summary: "東欧で自由化運動が広がる", text: "冷戦下の政治体制に対する挑戦として歴史的意義を持つ。", image: "https://images.unsplash.com/photo-1528722828814-7b8c7e7a9d5d?w=800&q=80" },
          { year: 1971, title: "アムネスティ・インターナショナルが活動拡大", score: 5, summary: "人権擁護活動が世界的に広がる", text: "政治犯の解放や人権問題への国際的関心を高める重要な役割を果たした。", image: "https://images.unsplash.com/photo-1509099836639-18ba1795216d?w=800&q=80" },
          { year: 2008, title: "スペースXの影響力拡大", score: 5, summary: "民間宇宙開発が進展", text: "宇宙開発の商業化を加速させ、国家主導から民間主導への転換点となった。", image: "https://images.unsplash.com/photo-1516339901601-2e1a62d0bd1c?w=800&q=80" }
        ]
      }
    ];

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    /** 文中の **太字** を <strong> に（本文は esc） */
    function formatBoldSegments(s) {
      const parts = s.split(/(\*\*[^*]+\*\*)/g);
      return parts
        .map(function (p) {
          if (/^\*\*[^*]+\*\*$/.test(p)) {
            return "<strong>" + esc(p.slice(2, -2)) + "</strong>";
          }
          return esc(p);
        })
        .join("");
    }

    function eraForYear(y) {
      if (y >= 2019) { const n = y - 2018; return n === 1 ? "令和元年" : `令和${n}年`; }
      if (y >= 1989) { const n = y - 1988; return n === 1 ? "平成元年" : `平成${n}年`; }
      if (y >= 1926) { const n = y - 1925; return n === 1 ? "昭和元年" : `昭和${n}年`; }
      if (y >= 1912) { const n = y - 1911; return n === 1 ? "大正元年" : `大正${n}年`; }
      if (y >= 1868) { const n = y - 1867; return n === 1 ? "明治元年" : `明治${n}年`; }
      return "";
    }

    const parts = [];
    categories.forEach((cat) => {
      const block = [];
      const headTitle =
        (cat.emoji ? esc(cat.emoji) + " " : "") + esc(cat.title);
      block.push(
        `<div class="section-label">${esc(cat.title)}</div>
        <div class="section-head">
          <h2 class="section-title-ja">${headTitle}</h2>
          <span class="section-sort">${esc(cat.sort)}</span>
        </div>`
      );
      cat.events.forEach((e) => {
        const era = eraForYear(e.year);
        block.push(`
            <article class="card card--std">
              <div class="card--std__head">
                <span class="card--std__year">${esc(String(e.year))}年</span>
                <span style="font-size:0.65rem;color:var(--text-dim)">${esc(era || "—")}</span>
              </div>
              <h3 class="card--std__h">${esc(e.title)}</h3>
              <p class="card--std__p">${esc(e.summary)} <br /><br />${esc(e.text)}</p>
            </article>
          `);
      });
      parts.push(block.join(""));
    });

    parts.push(`
      <article class="card card--fact">
        <p class="label-tag">Fact</p>
        <p>年間を通じ、同じ日付に重なる出来事は複数あり得ます。本モックは、世界史を横断する出来事の閲覧体験を想定したデモです。</p>
      </article>
    `);

    document.getElementById("root").innerHTML = parts.join("");

    (function setClock() {
      const el = document.getElementById("clock");
      const pad = (n) => (n < 10 ? "0" + n : String(n));
      const tick = () => {
        const t = new Date();
        el.textContent = pad(t.getHours()) + ":" + pad(t.getMinutes());
      };
      tick();
      setInterval(tick, 30000);
    })();

    (function setHeroFV() {
      const y = FV_EVENT.year;
      const m = FV_EVENT.month;
      const d = FV_EVENT.day;
      const eyec = document.getElementById("hero-fv-eyecatch");
      if (eyec) {
        eyec.innerHTML =
          '<span class="hero__fv-year">' + esc(String(y) + "年") + "</span> — " + esc(FV_EVENT.titleLine);
      }
      const heroJp = document.getElementById("hero-jp");
      if (heroJp) heroJp.textContent = m + "月" + d + "日";
      const t = new Date(y, m - 1, d);
      const w = ["日", "月", "火", "水", "木", "金", "土"][t.getDay()];
      const sub = document.getElementById("hero-sub");
      if (sub) {
        sub.textContent =
          "西暦" + y + "年" + m + "月" + d + "日（" + w + "）。" + FV_EVENT.lead;
      }
      const sum = document.getElementById("hero-fv-summary");
      if (sum) {
        sum.innerHTML = formatBoldSegments(FV_EVENT.summary);
      }
      const body = document.getElementById("hero-fv-body");
      if (body) {
        body.innerHTML = FV_EVENT.descriptionParagraphs
          .map(function (p) { return "<p>" + formatBoldSegments(p) + "</p>"; })
          .join("");
      }
    })();

    (function initHeroSlider() {
      const track = document.getElementById("hero-track");
      const dotsWrap = document.getElementById("hero-dots");
      const vp = document.getElementById("hero-viewport");
      const prev = document.getElementById("hero-prev");
      const next = document.getElementById("hero-next");
      if (!track || !dotsWrap || !vp) return;
      const n = HERO_IMAGES.length;
      if (n === 0) return;
      document.getElementById("hero-slider").style.setProperty("--hero-slides", String(n));
      const slidesHtml = HERO_IMAGES.map(
        (src, j) =>
          `<li class="hero-slider__slide" data-slide="${j}" role="group" aria-roledescription="スライド" aria-label="スライド ${j + 1} / ${n}"><img class="img-g" src="${esc(src)}" width="800" height="800" alt="" ${j > 0 ? "loading='lazy' decoding='async'" : ""} /></li>`
      );
      track.innerHTML = slidesHtml.join("");
      track.style.width = n * 100 + "%";
      const dots = HERO_IMAGES.map(
        (_src, j) =>
          `<button type="button" class="hero-slider__dot" id="hero-dot-${j}" aria-label="スライド ${j + 1} へ移動" aria-pressed="false"></button>`
      );
      dotsWrap.innerHTML = dots.join("");
      let i = 0;
      const dotEls = () => Array.from(dotsWrap.querySelectorAll(".hero-slider__dot"));
      function go(idx) {
        i = (idx + n) % n;
        track.style.transform = "translate3d(calc(-100% * " + i + " / " + n + "),0,0)";
        dotEls().forEach((b, j) => {
          const on = j === i;
          b.setAttribute("aria-pressed", on ? "true" : "false");
          b.setAttribute("aria-current", on ? "true" : "false");
          b.classList.toggle("hero-slider__dot--on", on);
        });
      }
      go(0);
      if (prev) prev.addEventListener("click", function () { go(i - 1); resetAuto(); });
      if (next) next.addEventListener("click", function () { go(i + 1); resetAuto(); });
      dotEls().forEach((b, j) => b.addEventListener("click", function () { go(j); resetAuto(); }));
      var swipeDx = 0;
      var touch0 = 0;
      let tId = 0;
      const AUTO_MS = 5500;
      const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      function startAuto() {
        if (reduced) return;
        clearInterval(tId);
        tId = setInterval(function () { go(i + 1); }, AUTO_MS);
      }
      function resetAuto() {
        startAuto();
      }
      startAuto();
      vp.addEventListener("focusin", function () { clearInterval(tId); });
      vp.addEventListener(
        "touchstart",
        function (e) {
          if (e.touches.length !== 1) return;
          swipeDx = 0;
          touch0 = e.touches[0].clientX;
        },
        { passive: true }
      );
      vp.addEventListener(
        "touchmove",
        function (e) {
          if (e.touches.length !== 1) return;
          swipeDx = e.touches[0].clientX - touch0;
        },
        { passive: true }
      );
      vp.addEventListener("touchend", function () {
        if (Math.abs(swipeDx) > 44) {
          if (swipeDx > 0) go(i - 1);
          else go(i + 1);
          resetAuto();
        }
        swipeDx = 0;
      });
      vp.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") { e.preventDefault(); go(i - 1); resetAuto(); }
        if (e.key === "ArrowRight") { e.preventDefault(); go(i + 1); resetAuto(); }
      });
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) clearInterval(tId);
        else startAuto();
      });
      window.addEventListener("resize", function () {
        go(i);
      });
    })();
  </script>
</body>
</html>
